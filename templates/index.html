<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Calorías</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">🔥 Balance Calórico</h1>
                <button class="btn-historial" id="btnHistorial">📊 Historial</button>
            </div>
        </header>

        <!-- MAIN PAGE -->
        <main id="mainPage" class="main-page">
            <div class="container">
                <section class="card input-section">
                    <h2>Hoy, <span id="fechaHoy"></span></h2>
                    
                    <form id="formulario">
                        <div class="input-group">
                            <label for="cal_ingeridas">Calorías consumidas</label>
                            <input type="number" id="cal_ingeridas" placeholder="Ej: 2500" required>
                        </div>

                        <div class="divider"></div>

                        <h3 class="section-title">Actividades</h3>

                        <div class="input-group">
                            <label for="cal_caminata">Caminata</label>
                            <div class="input-with-unit">
                                <input type="number" id="cal_caminata" placeholder="0" value="0">
                                <span class="unit">kcal</span>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="cal_gym">Entrenamiento (Gym)</label>
                            <div class="input-with-unit">
                                <input type="number" id="cal_gym" placeholder="0" value="0">
                                <span class="unit">kcal</span>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="cal_extra">Otra actividad</label>
                            <div class="input-with-unit">
                                <input type="number" id="cal_extra" placeholder="0" value="0">
                                <span class="unit">kcal</span>
                            </div>
                        </div>

                        <button type="submit" class="btn-calcular">Guardar hoy</button>
                    </form>
                </section>

                <section id="resultado" class="card resultado hidden">
                    <div class="resultado-header">
                        <h2>Resultado del día</h2>
                        <span class="resultado-badge" id="resultadoBadge">Mantenimiento</span>
                    </div>

                    <div class="resultado-main">
                        <div class="balance-box" id="balanceBox">
                            <span class="balance-value" id="balanceValue">0 kcal</span>
                            <span class="balance-label" id="balanceLabel">Mantenimiento</span>
                        </div>
                    </div>

                    <div class="resultado-grid">
                        <div class="stat-item">
                            <span class="stat-label">Consumido</span>
                            <span class="stat-value" id="cal_consumido">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Quemado</span>
                            <span class="stat-value" id="cal_quemado">0</span>
                        </div>
                    </div>

                    <div class="actividades-desglose">
                        <h4>Desglose de actividades</h4>
                        <div id="actividadesDetalle" class="actividades-list"></div>
                    </div>

                    <button class="btn-eliminar" id="btnEliminarHoy">🗑️ Eliminar registro de hoy</button>
                </section>
            </div>
        </main>

        <!-- HISTORY PAGE -->
        <div id="historialPage" class="historial-page hidden">
            <div class="container">
                <header class="historial-header">
                    <button class="btn-volver" id="btnVolver">← Atrás</button>
                    <h1>Historial</h1>
                </header>

                <section class="card estadisticas-section">
                    <h2>Últimos 7 días</h2>
                    
                    <div class="chart-container">
                        <canvas id="chart"></canvas>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-number" id="diasDeficit">0</span>
                            <span class="stat-text">Días déficit</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number" id="diasSuperavit">0</span>
                            <span class="stat-text">Días superávit</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number" id="promedioCalorico">0</span>
                            <span class="stat-text">Promedio kcal</span>
                        </div>
                    </div>
                </section>

                <section class="card registros-section">
                    <h2>Registros</h2>
                    <div id="registrosList" class="registros-list"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
